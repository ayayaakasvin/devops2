apiVersion: v1
kind: Pod
metadata:
  name: lab4-best-effort
  labels:
    app: best-effort

spec:
  containers:
    - name: application
      image: simple-golang-app:1.0
      imagePullPolicy: Never
      ports:
      - name: http-port
        containerPort: 8080

      resources: {}

      readinessProbe:
        httpGet:
          path: /ready
          port: 8080
        initialDelaySeconds: 2
        periodSeconds: 2

      livenessProbe:
        httpGet:
          path: /health
          port: 8080
          httpHeaders:
            - name: Authorization
              value: iad1i9f1yj0ne5zo
        initialDelaySeconds: 5
        periodSeconds: 2
        timeoutSeconds: 1
        failureThreshold: 1