apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lab8-chart.fullname" . }}-policy
spec:
  podSelector:
    matchLabels:
      {{- include "lab8-chart.selectorLabels" . | nindent 4 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "lab8-chart.selectorLabels" . | nindent 10 }}