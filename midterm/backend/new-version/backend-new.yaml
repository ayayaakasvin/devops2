apiVersion: v1
kind: Pod
metadata:
  name: backend
  labels:
    app: midterm-app
    role: backend

spec:
  replicas: 3

  volumes:
  - name: app-config
    configMap:
      name: app-config

  securityContext:
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault

  containers:
  - name: application
    image: application:1.1 # updated image version
    imagePullPolicy: Never
    ports:
    - name: http-port
      containerPort: 80

    volumeMounts:
    - name: app-config
      mountPath: /etc/config
      readOnly: true
    resources:
          requests:
            memory: "300Mi"
            cpu: "300m"
          limits:
            memory: "600Mi"
            cpu: "600m"
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 3000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    readinessProbe:
      httpGet:
        path: /api/health
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      httpGet:
        path: /api/health
        port: 80
      initialDelaySeconds: 15
      periodSeconds: 29
      timeoutSeconds: 2
      failureThreshold: 5
      successThreshold: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1