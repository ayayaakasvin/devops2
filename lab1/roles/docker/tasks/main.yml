- name: Install required packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    update_cache: true

- name: Install Docker
  apt:
    name: docker.io
    state: present

- name: Install required packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - docker.io
      - python3-docker
    update_cache: true

- name: Enable Docker
  systemd:
    name: docker
    enabled: true
    state: started

- name: Install docker dependencies for Ansible
  apt:
    name:
      - python3-docker
    state: present